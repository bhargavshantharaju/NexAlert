<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexAlert Command Center</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0e1a;
            color: #e8eaed;
            display: grid;
            grid-template-columns: 320px 1fr 280px;
            height: 100vh;
            overflow: hidden;
        }

        /* Left Sidebar - Users & Alerts */
        .sidebar-left {
            background: #141824;
            border-right: 1px solid #1e2433;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .header {
            padding: 20px;
            background: linear-gradient(135deg, #00d4ff, #7000ff);
            border-bottom: 2px solid #00d4ff;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .header .subtitle {
            font-size: 11px;
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            padding: 12px;
            background: #0a0e1a;
        }

        .stat-card {
            background: #1a1f2e;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #252b3d;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #00d4ff;
        }

        .stat-label {
            font-size: 10px;
            color: #8b92a8;
            margin-top: 4px;
        }

        .section {
            padding: 15px;
            border-bottom: 1px solid #1e2433;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #00d4ff;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-small {
            padding: 5px 10px;
            background: #1a1f2e;
            border: 1px solid #00d4ff;
            border-radius: 5px;
            color: #00d4ff;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-small:hover {
            background: #00d4ff;
            color: #0a0e1a;
        }

        .user-list, .alert-list {
            max-height: 250px;
            overflow-y: auto;
        }

        .user-item, .alert-item {
            background: #1a1f2e;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 6px;
            border: 1px solid #252b3d;
            cursor: pointer;
            transition: all 0.2s;
        }

        .user-item:hover, .alert-item:hover {
            border-color: #00d4ff;
            transform: translateX(3px);
        }

        .user-name, .alert-type {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 3px;
        }

        .user-status, .alert-time {
            font-size: 10px;
            color: #8b92a8;
        }

        .status-online { color: #00ff88; }
        .status-offline { color: #ff4466; }

        /* Main Content - Map */
        .main-content {
            display: flex;
            flex-direction: column;
        }

        .toolbar {
            background: #141824;
            padding: 12px 15px;
            border-bottom: 1px solid #1e2433;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            background: #1a1f2e;
            border: 1px solid #00d4ff;
            border-radius: 6px;
            color: #00d4ff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #00d4ff;
            color: #0a0e1a;
        }

        .btn-danger {
            border-color: #ff4466;
            color: #ff4466;
        }

        .btn-danger:hover {
            background: #ff4466;
            color: white;
        }

        #map {
            flex: 1;
        }

        /* Right Sidebar - Environmental & Admin */
        .sidebar-right {
            background: #141824;
            border-left: 1px solid #1e2433;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .env-section {
            padding: 15px;
            border-bottom: 1px solid #1e2433;
        }

        .env-card {
            background: #1a1f2e;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #252b3d;
        }

        .env-label {
            font-size: 11px;
            color: #8b92a8;
            margin-bottom: 5px;
        }

        .env-value {
            font-size: 22px;
            font-weight: 700;
            color: #00d4ff;
        }

        .env-unit {
            font-size: 14px;
            color: #8b92a8;
            margin-left: 5px;
        }

        .chart-container {
            height: 120px;
            margin-top: 10px;
        }

        .admin-controls {
            padding: 15px;
        }

        .control-btn {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            background: #1a1f2e;
            border: 1px solid #252b3d;
            border-radius: 6px;
            color: #e8eaed;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .control-btn:hover {
            background: #252b3d;
            border-color: #00d4ff;
        }

        .broadcast-panel {
            padding: 15px;
            border-top: 1px solid #1e2433;
        }

        #broadcast-input {
            width: 100%;
            padding: 10px;
            background: #1a1f2e;
            border: 1px solid #252b3d;
            border-radius: 6px;
            color: #e8eaed;
            font-size: 12px;
            margin-bottom: 8px;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0e1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #252b3d;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00d4ff;
        }

        .legend {
            background: rgba(20, 24, 36, 0.95);
            padding: 12px;
            border-radius: 8px;
            position: absolute;
            top: 70px;
            right: 300px;
            z-index: 1000;
            border: 1px solid #00d4ff;
        }

        .legend-title {
            font-size: 12px;
            font-weight: 600;
            color: #00d4ff;
            margin-bottom: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <!-- Left Sidebar -->
    <div class="sidebar-left">
        <div class="header">
            <h1>🚨 NexAlert</h1>
            <div class="subtitle">Command & Control Center</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="stat-users">0</div>
                <div class="stat-label">ONLINE</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-alerts">0</div>
                <div class="stat-label">ALERTS</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-messages">0</div>
                <div class="stat-label">MESSAGES</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-temp">--</div>
                <div class="stat-label">TEMP °C</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">
                <span>👥 Network Users</span>
                <button class="btn-small" onclick="refreshUsers()">🔄</button>
            </div>
            <div class="user-list" id="user-list"></div>
        </div>

        <div class="section">
            <div class="section-title">
                <span>🚨 Active Alerts</span>
                <button class="btn-small" onclick="clearResolvedAlerts()">Clear</button>
            </div>
            <div class="alert-list" id="alert-list"></div>
        </div>

        <div class="broadcast-panel">
            <input type="text" id="broadcast-input" placeholder="Broadcast message...">
            <button class="btn" onclick="sendBroadcast()" style="width: 100%;">📢 Send</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="toolbar">
            <button class="btn" onclick="centerMap()">🎯 Center</button>
            <button class="btn" onclick="toggleTraffic()">🚦 Traffic</button>
            <button class="btn" onclick="toggleSatellite()">🛰️ Satellite</button>
            <button class="btn" onclick="exportData()">💾 Export</button>
            <button class="btn btn-danger" onclick="emergencyShutdown()">⚠️ Emergency Stop</button>
        </div>

        <div id="map"></div>

        <div class="legend">
            <div class="legend-title">Map Legend</div>
            <div class="legend-item"><span>🟢</span> Online User</div>
            <div class="legend-item"><span>⚪</span> Offline User</div>
            <div class="legend-item"><span>🚨</span> Emergency Alert</div>
            <div class="legend-item"><span>📍</span> Base Station</div>
        </div>
    </div>

    <!-- Right Sidebar -->
    <div class="sidebar-right">
        <div class="section">
            <div class="section-title">🌡️ Environmental</div>
            
            <div class="env-card">
                <div class="env-label">Temperature</div>
                <div class="env-value" id="env-temp">--<span class="env-unit">°C</span></div>
            </div>

            <div class="env-card">
                <div class="env-label">Humidity</div>
                <div class="env-value" id="env-humidity">--<span class="env-unit">%</span></div>
            </div>

            <div class="env-card">
                <div class="env-label">Air Quality</div>
                <div class="env-value" id="env-airquality">--</div>
                <div class="chart-container">
                    <canvas id="airQualityChart"></canvas>
                </div>
            </div>

            <div class="env-card">
                <div class="env-label">Battery / Solar</div>
                <div class="env-value" id="env-battery">--<span class="env-unit">V</span></div>
            </div>
        </div>

        <div class="admin-controls">
            <div class="section-title">⚙️ Admin Controls</div>
            <button class="control-btn" onclick="backupDatabase()">💾 Backup Database</button>
            <button class="control-btn" onclick="cleanupOldData()">🧹 Cleanup Old Data</button>
            <button class="control-btn" onclick="exportAllData()">📦 Export All Data</button>
            <button class="control-btn" onclick="viewLogs()">📄 View Logs</button>
            <button class="control-btn" onclick="restartServices()">🔄 Restart Services</button>
            <button class="control-btn" onclick="showSystemInfo()">ℹ️ System Info</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/phone.js') }}"></script>
    <script>
        // Same JavaScript as before, plus environmental updates
        // (Keeping the existing map code and adding environmental chart)
        
        const API_BASE = window.location.origin;
        let socket;
        let map;
        let markers = {};
        let alertMarkers = {};
        let trafficLayer;
        let allUsers = [];
        let allAlerts = [];
        let airQualityChart;

        // Initialize
        window.onload = () => {
            initMap();
            initSocket();
            initCharts();
            refreshUsers();
            refreshAlerts();
            refreshEnvironmental();
            
            setInterval(() => {
                refreshUsers();
                refreshAlerts();
                refreshEnvironmental();
            }, 10000);
        };

        function initCharts() {
            const ctx = document.getElementById('airQualityChart').getContext('2d');
            airQualityChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Air Quality',
                        data: [],
                        borderColor: '#00d4ff',
                        backgroundColor: 'rgba(0, 212, 255, 0.1)',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { display: false }
                    }
                }
            });
        }

        async function refreshEnvironmental() {
            try {
                const response = await fetch(`${API_BASE}/api/environmental?limit=10`);
                const result = await response.json();
                
                if (result.data && result.data.length > 0) {
                    const latest = result.data[0];
                    
                    document.getElementById('env-temp').innerHTML = 
                        `${latest.temperature || '--'}<span class="env-unit">°C</span>`;
                    document.getElementById('env-humidity').innerHTML = 
                        `${latest.humidity || '--'}<span class="env-unit">%</span>`;
                    document.getElementById('env-airquality').textContent = 
                        latest.air_quality || '--';
                    document.getElementById('env-battery').innerHTML = 
                        `${latest.battery_voltage || '--'}<span class="env-unit">V</span>`;
                    document.getElementById('stat-temp').textContent = 
                        Math.round(latest.temperature) || '--';
                    
                    // Update chart
                    airQualityChart.data.labels = result.data.map((d, i) => i).reverse();
                    airQualityChart.data.datasets[0].data = result.data.map(d => d.air_quality).reverse();
                    airQualityChart.update();
                }
            } catch (error) {
                console.error('Environmental data error:', error);
            }
        }

        // Admin functions
        async function backupDatabase() {
            alert('Database backup initiated...');
            // Call backup API endpoint
        }

        function cleanupOldData() {
            if (confirm('Remove old messages and resolved alerts?')) {
                alert('Cleanup initiated...');
            }
        }

        function exportAllData() {
            exportData();
        }

        function viewLogs() {
            window.open('/logs', '_blank');
        }

        function restartServices() {
            if (confirm('Restart NexAlert services?')) {
                alert('Services restarting...');
            }
        }

        async function showSystemInfo() {
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                alert(JSON.stringify(data, null, 2));
            } catch (error) {
                alert('Failed to fetch system info');
            }
        }

        function emergencyShutdown() {
            if (confirm('EMERGENCY STOP - Are you sure?')) {
                alert('Emergency shutdown sequence initiated');
            }
        }

        // Keep all previous map and user management code...
        function initMap() {
            const center = { lat: 12.9716, lng: 77.5946 };
            map = new google.maps.Map(document.getElementById('map'), {
                zoom: 13,
                center: center,
                mapTypeId: 'roadmap',
                styles: [
                    { elementType: "geometry", stylers: [{ color: "#1a1f2e" }] },
                    { elementType: "labels.text.fill", stylers: [{ color: "#8b92a8" }] }
                ]
            });
            trafficLayer = new google.maps.TrafficLayer();
        }

        function initSocket() {
            socket = io(API_BASE);
            socket.on('connect', () => console.log('✅ Connected'));
            socket.on('new_alert', addAlert);
            socket.on('environmental_update', updateEnvironmental);
        }

        function updateEnvironmental(data) {
            refreshEnvironmental();
        }

        // ... rest of the map code from previous dashboard ...
    </script>
</body>
</html>
