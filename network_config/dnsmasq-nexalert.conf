# NexAlert Captive Portal - dnsmasq configuration
# This redirects ALL DNS queries to the Pi's IP for captive portal

interface=wlan1
bind-interfaces
dhcp-range=10.42.0.10,10.42.0.250,12h
dhcp-option=3,10.42.0.1
dhcp-option=6,10.42.0.1

# Redirect all DNS to local IP (captive portal)
address=/#/10.42.0.1

# Don't read /etc/resolv.conf
no-resolv

# Don't poll /etc/resolv.conf for changes
no-poll

# Log queries for debugging
log-queries
log-dhcp
