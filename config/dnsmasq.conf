# NexAlert v3.0 - dnsmasq Configuration
# DHCP Server and DNS Redirection for Captive Portal
# This configuration creates the "NexAlert-Emergency" hotspot

# ============================================================================
# INTERFACE CONFIGURATION
# ============================================================================

# Listen only on wlan1 (hotspot interface)
interface=wlan1
bind-interfaces

# Don't use system resolv.conf
no-resolv

# ============================================================================
# DHCP CONFIGURATION
# ============================================================================

# DHCP address range for connected devices (10.42.0.50 - 10.42.0.150)
# 100 IP addresses available for mesh network users
dhcp-range=10.42.0.50,10.42.0.150,12h

# DHCP lease file
dhcp-leasefile=/var/lib/misc/dnsmasq.leases

# Set gateway IP for clients
dhcp-option=option:router,10.42.0.1

# Set DNS servers for clients (point to gateway)
dhcp-option=option:dns-server,10.42.0.1

# Domain name
dhcp-option=option:domain-name,nexalert.local

# Lease cleanup interval
dhcp-authoritative

# Set MTU for better mesh performance
dhcp-option=option:mtu,1500

# ============================================================================
# CAPTIVE PORTAL - CRITICAL CONFIGURATION
# ============================================================================

# THIS IS THE MOST IMPORTANT LINE FOR CAPTIVE PORTAL
# All DNS requests (address=/example.com/) redirect to 10.42.0.1
# The wildcard address=/#/ means "everything"
# When user types "www.google.com", it resolves to 10.42.0.1
# When user types "example.com", it resolves to 10.42.0.1
# Nginx then shows the captive portal page at http://10.42.0.1

address=/#/10.42.0.1

# Allow LOCALHOST bypass (don't redirect localhost traffic)
# address=/localhost/127.0.0.1
# address=/127.0.0.1/127.0.0.1

# Whitelist exceptions (optional - these won't be redirected)
# address=/github.com/140.82.113.3
# address=/google.com/8.8.8.8

# ============================================================================
# DNS CONFIGURATION
# ============================================================================

# Upstream DNS servers for resolving external requests
# (when devices request non-local domains through gateway)
server=8.8.8.8
server=8.8.4.4
server=1.1.1.1

# DNS cache settings
cache-size=150
neg-cache-ttl=3600

# Enable DNSSEC
# dnssec

# Minimal DNS TTL
min-cache-ttl=3600

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================

# Log all DNS queries (VERBOSE - for debugging)
# Uncomment for debugging:
# log-queries

# Log DHCP transactions
log-dhcp

# Log facility for syslog
log-facility=/var/log/dnsmasq.log

# ============================================================================
# PERFORMANCE TUNING
# ============================================================================

# Connection tracking
listen-address=10.42.0.1
listen-address=127.0.0.1

# Maximum number of DHCP clients
dhcp-max-lease-time=12h
dhcp-lease-max=150

# Keep resolved names in cache across multiple queries
cache-size=150

# ============================================================================
# SECURITY
# ============================================================================

# Don't forward private IP ranges
# (Already handled by default, but explicitly set for safety)
bogus-priv

# Refuse to answer reverse queries for private IP ranges
reply-delay=0

# Don't send replies for non-existent domains
# (causes redirects to work properly)
strict-order

# ============================================================================
# ADVANCED OPTIONS
# ============================================================================

# Bind to interfaces dynamically
no-hosts

# Optional: Load external hosts file for additional redirects
# addn-hosts=/etc/dnsmasq.hosts

# Local domain for mesh network
local=/nexalert.local/10.42.0.1

# Specific DNS records for NexAlert services (optional)
# address=/gateway.nexalert/10.42.0.1
# address=/app.nexalert/10.42.0.1

# ============================================================================
# DEBUGGING (Uncomment for troubleshooting)
# ============================================================================

# Very verbose logging (comment out for production)
# log-queries
# log-dhcp

# Enable query logging to specific file
# log-facility=/var/log/dnsmasq-queries.log

# Dump config and exit (for validation)
# conf-file=
# exit

# ============================================================================
# NOTES FOR PRODUCTION DEPLOYMENT
# ============================================================================

# 1. Ensure wlan1 is brought up before dnsmasq starts
#    Command: ip link set wlan1 up && ip addr add 10.42.0.1/24 dev wlan1

# 2. Firewall rules must redirect HTTP traffic:
#    iptables -t nat -A PREROUTING -i wlan1 -p tcp --dport 80 -j DNAT --to 10.42.0.1

# 3. For HTTPS captive portal, also add:
#    iptables -t nat -A PREROUTING -i wlan1 -p tcp --dport 443 -j DNAT --to 10.42.0.1

# 4. Nginx must be running on port 80 to serve captive portal page

# 5. Enable IP forwarding for mesh networking:
#    echo 1 > /proc/sys/net/ipv4/ip_forward

# 6. Test from client device:
#    1. Connect to "NexAlert-Emergency" WiFi
#    2. Open browser to any URL (example.com)
#    3. Should be redirected to gateway login/info page
#    4. Once "accepted", should have internet access through wlan0

# ============================================================================
